name: backfill

# Manual, per-collector backfill. A "plan" job enumerates work chunks; a matrix
# "run" job processes one chunk each (fetch -> normalize -> push shard to HF).
# Idempotent: shards already on HF are skipped, so re-running resumes cleanly.

on:
  workflow_dispatch:
    inputs:
      collector:
        description: collector to backfill
        type: choice
        options: [market_yahoo, macro_alfred, edgar, edgar_fulltext, crypto_yahoo, news_gdelt, news_hn, wiki_pageviews, fundamentals_sec, cftc_cot, short_finra, treasury_auctions, insider_form4, fed_text, holdings_13f, crypto_onchain, eia_energy, security_master, surprise_index, defillama, usgs_quakes, arxiv_papers, predict_manifold, nasa_events, predict_polymarket, crypto_funding, crypto_vol, crypto_fng, defillama_flows, predict_kalshi, credit_fred, real_estate_fred, commodities_fred, fed_register, fda_events, epu_index, clinical_trials, news_gkg, entity_graph, options_polygon, intraday_polygon, transcripts_fmp, estimates_fmp, news_tiingo, shipping_ais]
        required: true
      force:
        description: overwrite shards that already exist on HF
        type: boolean
        default: false
      universe_top:
        description: "(market_stooq only) cap universe size"
        default: "1500"

env:
  STORAGE_BACKEND: s3
  S3_BUCKET: ${{ vars.S3_BUCKET }}
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  HF_DATASET_REPO: ${{ vars.HF_DATASET_REPO }}
  HF_TOKEN: ${{ secrets.HF_TOKEN }}
  FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
  EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
  POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
  FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
  TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
  DATALASTIC_API_KEY: ${{ secrets.DATALASTIC_API_KEY }}

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - if: ${{ inputs.collector == 'market_yahoo' || inputs.collector == 'fundamentals_sec' || inputs.collector == 'edgar_fulltext' || inputs.collector == 'insider_form4' }}
        run: python -m scripts.build_universe --top ${{ inputs.universe_top }}
      - id: set
        run: |
          M=$(python -m scripts.run_collector ${{ inputs.collector }} list)
          echo "matrix=$M" >> "$GITHUB_OUTPUT"
          test -n "$M" && [ "$M" != "[]" ]   # fail loudly if the matrix is empty

  run:
    needs: plan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 16   # S3 has no commit rate limit — go wide for fast backfills
      matrix:
        chunk: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - if: ${{ inputs.collector == 'market_yahoo' || inputs.collector == 'fundamentals_sec' || inputs.collector == 'edgar_fulltext' || inputs.collector == 'insider_form4' }}
        run: python -m scripts.build_universe --top ${{ inputs.universe_top }}
      - name: run chunk ${{ matrix.chunk }}
        run: >
          python -m scripts.run_collector ${{ inputs.collector }} run
          --chunk "${{ matrix.chunk }}" ${{ inputs.force && '--force' || '' }}
