name: collect-trajectories

# Run agent episodes over the gym and write RL trajectories to the lake
# (domain=trajectories/source=env). Trigger from anywhere, incl. phone.

on:
  workflow_dispatch:
    inputs:
      episodes:
        description: number of episodes
        default: "5"
      task:
        type: choice
        options: [data_approval, trading, forecast]
        default: data_approval
      agent:
        type: choice
        options: [baseline, random, tooluser]
        default: baseline
      access_tier:
        type: choice
        options: [basic, pro]
        default: basic
      steps:
        description: decision steps per episode
        default: "12"

env:
  STORAGE_BACKEND: s3
  S3_BUCKET: ${{ vars.S3_BUCKET }}
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - run: >
          python -m scripts.collect_trajectories
          --episodes ${{ inputs.episodes }} --task ${{ inputs.task }}
          --agent ${{ inputs.agent }} --access-tier ${{ inputs.access_tier }}
          --steps ${{ inputs.steps }}
