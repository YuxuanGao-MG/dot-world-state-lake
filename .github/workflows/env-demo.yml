name: env-demo

# Watch a baseline agent play the financial-agent gym over the point-in-time
# lake. Trigger from anywhere (phone: Actions -> env-demo -> Run) and read the
# reset/observe/act/reward loop in the log.

on:
  workflow_dispatch:
    inputs:
      steps:
        description: number of decision steps
        default: "20"
      task:
        type: choice
        options: [data_approval, forecast]
        default: data_approval

env:
  STORAGE_BACKEND: s3
  S3_BUCKET: ${{ vars.S3_BUCKET }}
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

jobs:
  demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - run: python -m scripts.run_env_demo --steps ${{ inputs.steps }} --task ${{ inputs.task }}
