name: incremental

# Daily refresh after backfill. Macro picks up new vintages/revisions; market
# refreshes bars (incl. the newest day); edgar refreshes the current quarter.
# Runs with --force so today's data overwrites the relevant shards. Light enough
# to sit comfortably inside the Actions budget.

on:
  schedule:
    - cron: "0 8 * * *"   # 08:00 UTC daily
  workflow_dispatch:

env:
  STORAGE_BACKEND: s3
  S3_BUCKET: ${{ vars.S3_BUCKET }}
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  HF_DATASET_REPO: ${{ vars.HF_DATASET_REPO }}
  HF_TOKEN: ${{ secrets.HF_TOKEN }}
  FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
  EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
  POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
  FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
  TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
  DATALASTIC_API_KEY: ${{ secrets.DATALASTIC_API_KEY }}

jobs:
  refresh:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        collector: [macro_alfred, edgar, edgar_fulltext, market_yahoo, crypto_yahoo, news_gdelt, news_hn, wiki_pageviews, fundamentals_sec, cftc_cot, short_finra, treasury_auctions, insider_form4, fed_text, holdings_13f, crypto_onchain, eia_energy, security_master, surprise_index, defillama, usgs_quakes, arxiv_papers, predict_manifold, nasa_events, predict_polymarket, crypto_funding, crypto_vol, crypto_fng, defillama_flows, predict_kalshi, credit_fred, real_estate_fred, commodities_fred, fed_register, fda_events, epu_index, clinical_trials, news_gkg, entity_graph, features]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - if: ${{ matrix.collector == 'market_yahoo' || matrix.collector == 'fundamentals_sec' || matrix.collector == 'edgar_fulltext' || matrix.collector == 'insider_form4' }}
        run: python -m scripts.build_universe --top 1500
      - name: refresh ${{ matrix.collector }}
        run: python -m scripts.run_collector ${{ matrix.collector }} run-all --force
